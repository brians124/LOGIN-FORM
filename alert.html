<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SECURITY ALERT</title>
    <style>
        :root {
            --alert-red: #ff3b30; /* Brighter, standard iOS/Android alert red */
            --glass-bg: rgba(0, 0, 0, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Prevents rubber-banding on iOS */
            position: fixed;
            width: 100%;
        }

        /* Emergency Background */
        .emergency-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #400 0%, #000 100%);
            z-index: -1;
            opacity: 0.5;
        }

        /* Responsive Flash Animation */
        @media (prefers-reduced-motion: no-preference) {
            .emergency-overlay {
                animation: siren-flash 1.5s infinite;
            }
        }

        @keyframes siren-flash {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; background-color: #f00; }
        }

        /* Responsive Glass Container */
        .alert-container {
            width: 90%;
            max-width: 450px;
            /* Using padding-top/bottom to account for mobile notches if necessary */
            padding: 2.5rem 1.5rem;
            padding-bottom: calc(2.5rem + env(safe-area-inset-bottom));
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px; /* Softer, modern corners */
            text-align: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Fluid Typography */
        .glitch-text {
            font-size: clamp(1.5rem, 8vw, 2.2rem);
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--alert-red);
            line-height: 1.1;
        }

        .status-msg {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            margin-bottom: 2rem;
            color: #ccc;
            opacity: 0.9;
        }

        /* Enhanced Mobile Button */
        #secure-btn {
            background: var(--alert-red);
            color: white;
            border: none;
            width: 100%; /* Full width on mobile for easier reach */
            max-width: 280px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent; /* Removes blue flash on tap */
        }

        #secure-btn:active {
            transform: scale(0.96);
            filter: brightness(1.2);
        }

    </style>
</head>
<body>

    <div class="emergency-overlay"></div>

    <div class="alert-container">
        <div class="glitch-text">SYSTEM COMPROMISED</div>
        <p class="status-msg">
            Unauthorized intrusion detected.<br>
            Encryption protocols failing.
        </p>
        <button id="secure-btn">SECURE DEVICE</button>
    </div>

    <script>
        const secureBtn = document.getElementById('secure-btn');
        let isSecuring = false;

        secureBtn.addEventListener('click', () => {
            if (isSecuring) return;
            isSecuring = true;
            
            // Haptic Feedback for Mobile Devices
            if (window.navigator.vibrate) {
                window.navigator.vibrate([100, 30, 100]);
            }

            secureBtn.innerText = "INITIALIZING...";
            
            // Trigger speech (User gesture requirement met by click)
            const msg = new SpeechSynthesisUtterance("Warning. Security Breach.");
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);

            // Simulation of "securing"
            setTimeout(() => {
                secureBtn.innerText = "SYSTEM SECURED";
                secureBtn.style.background = "#34c759"; // Green
                document.querySelector('.emergency-overlay').style.animation = "none";
                document.querySelector('.emergency-overlay').style.background = "#002200";
            }, 3000);
        });
    </script>
</body>
</html>
